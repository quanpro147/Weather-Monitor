  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #     - ./infra/supabase/schema.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: weather-monitor-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redisdata:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: weather-monitor-api
    env_file: .env
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      - redis
    restart: unless-stopped

  pipeline:
    build:
      context: .
      dockerfile: data-pipeline/Dockerfile
    container_name: weather-data-pipeline
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
